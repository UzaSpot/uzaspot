<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UzaSpot</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f7fb;
  color: #333;
  text-align: center;
}

/* ヘッダー */
header {
  background: linear-gradient(135deg, #5b8fdc, #6fa8ff);
  padding: 60px 20px;
  color: white;
}

/* ロゴ */
.logo {
  width: 220px;
  max-width: 80%;
  margin-bottom: 20px;
  border-radius: 12px;
}

/* キャッチコピー */
header p {
  font-size: 18px;
  opacity: 0.9;
}

/* コンテンツ */
.container {
  padding: 40px 20px;
}

/* ボタン */
.button {
  display: inline-block;
  background: linear-gradient(135deg, #5b8fdc, #6fa8ff);
  color: white;
  padding: 14px 28px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 16px;
  margin-top: 20px;
  transition: 0.3s;
}

.button:hover {
  opacity: 0.8;
}

/* フッター */
footer {
  margin-top: 40px;
  font-size: 14px;
  color: #777;
}
</style>

</head>

<body>

<header>
  <img src="logo.PNG" class="logo">
  <h1>UzaSpot</h1>
  <p>暮らしの隣にうさぎ。仕事の隣にAI。</p>
</header>

<div class="container">
  <p>
    業務効率化ツールや日常を便利にする情報を発信しています。<br><br>
    現在、無料ソフトを準備中です。
  </p>

  <a href="#" class="button">無料ソフトを見る（準備中）</a>
</div>

<footer>
  © UzaSpot
</footer>

</body>
</html>
