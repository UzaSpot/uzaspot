<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Uzaspot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f7fb;
      color: #333;
      text-align: center;
    }

    header {
      background: linear-gradient(135deg, #4da3ff, #6bb8ff);
      color: white;
      padding: 60px 20px;
    }

    .logo {
      width: 220px;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 18px;
      opacity: 0.95;
    }

    .container {
      padding: 50px 20px;
      max-width: 600px;
      margin: auto;
    }

    .text {
      font-size: 18px;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      margin-top: 20px;
      background: #4da3ff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #2f8fff;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

<header>
  <img src="logo.PNG" class="logo" alt="Uzaspot logo">
  <div class="subtitle">暮らしの隣にうさぎ。仕事の隣にAI。</div>
</header>

<div class="container">
  <div class="text">
    業務効率化ツールや日常を便利にする情報を発信しています。
  </div>

  <div class="text">
    現在、無料ソフトを準備中です。
  </div>

  <a href="#" class="btn">無料ソフトを見る（準備中）</a>
</div>

<footer>
  © Uzaspot
</footer>

</body>
</html>
